{% extends "base.html" %}

{% block content %}
<section class="card narrow login-card">
    <div class="login-logo-wrap">
        <img src="{{ url_for('static', filename='stockpilot-logo.png') }}" alt="Stock Pilot Logo" class="login-logo">
    </div>

    <h1>Stock Pilot Login</h1>
    <p>Enter your employee ID to continue.</p>

    <form method="POST" class="form-grid">
        <label>Employee ID</label>
        <input type="password" name="employee_code" required>

        <button type="submit">Log In</button>
    </form>
</section>
{% endblock %}
